# =====================================================================
# Configuration for the COVID-19 / Pharmaceutical Stock Analysis Pipeline
# =====================================================================

# ----- Paths -----
covid_raw_folder: "csse_covid_19_daily_reports_us"
data_processed_dir: "data/processed"
results_dir: "results"
figures_dir: "results/figures"
analysis_dir: "results/analysis"

# ----- Date range -----
start_date: "2021-01-01"
end_date:   "2022-01-01"
year_filter: "2021"

# ----- Tickers -----
tickers:
  - "CVS"
  - "JNJ"
  - "ABBV"

# ----- Feature engineering parameters -----
infection_window: 7        # rolling window for new confirmed cases
mortality_window: 14       # rolling window for new deaths
infection_weight: 0.3      # weight of infection Z-score in composite index
mortality_weight: 0.7      # weight of mortality Z-score in composite index
